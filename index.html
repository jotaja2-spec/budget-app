<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --text:#e8eaf0;--muted:#7c8299;--accent:#6c63ff;--accent2:#00d4aa;
  --red:#ff5c6b;--amber:#ffb84d;--green:#4ade80;--blue:#38bdf8;
  --radius:14px;--radius-sm:8px;--nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;overscroll-behavior:none}
#root{height:100%;display:flex;flex-direction:column}
.app-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:600px;margin:0 auto;width:100%}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav-h) + var(--safe-b) + 24px);-webkit-overflow-scrolling:touch}
/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;height:calc(var(--nav-h) + var(--safe-b));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:6px;padding-bottom:var(--safe-b);z-index:100}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:10px;font-weight:500;transition:color .15s;min-width:52px}
.bnav-item.active{color:var(--accent)}
.bnav-item svg{width:22px;height:22px}
.bnav-fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);right:max(16px,calc(50% - 284px));width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,99,255,.5);z-index:101;transition:transform .15s}
.bnav-fab:active{transform:scale(.93)}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:20px 0 8px}
/* Metric cards */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:4px}
.mcard-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.mcard-val{font-size:22px;font-weight:800}
.mcard-sub{font-size:12px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
/* Status banner */
.sbanner{border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-weight:600}
.sbanner.green{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.sbanner.amber{background:rgba(255,184,77,.12);border:1px solid rgba(255,184,77,.3);color:var(--amber)}
.sbanner.red{background:rgba(255,92,107,.12);border:1px solid rgba(255,92,107,.3);color:var(--red)}
.sbanner.blue{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);color:var(--blue)}
.sbanner svg{flex-shrink:0;width:20px;height:20px}
/* Auth */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:400px}
.auth-title{font-size:24px;font-weight:800;margin-bottom:4px}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
/* Forms */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:72px}
.field select option{background:var(--surface)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;transition:opacity .15s,transform .1s;width:100%}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(255,92,107,.15);color:var(--red);border:1px solid rgba(255,92,107,.3)}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn:disabled{opacity:.45;cursor:not-allowed}
.auth-toggle{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
.auth-toggle button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-size:14px}
/* Bill row */
.bill-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.bill-row:last-child{border-bottom:none}
.bill-info{display:flex;flex-direction:column;gap:2px}
.bill-name{font-weight:600;font-size:15px}
.bill-due{font-size:12px;color:var(--muted)}
.bill-amt{font-weight:700;font-size:16px}
.bill-soon{color:var(--amber)}
.bill-overdue{color:var(--red)}
/* Income type badges */
.inc-type{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.inc-paycheck{background:rgba(108,99,255,.2);color:var(--accent)}
.inc-bonus{background:rgba(0,212,170,.2);color:var(--accent2)}
.inc-other{background:rgba(255,184,77,.2);color:var(--amber)}
/* Claim banner */
.claim-banner{background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;flex-direction:column;gap:10px}
.claim-banner p{font-size:14px;color:var(--text)}
.claim-banner .claim-actions{display:flex;gap:8px}
/* Toast */
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:400px}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:slideIn .2s ease;pointer-events:all}
.toast.success{border-color:rgba(74,222,128,.4);color:var(--green)}
.toast.error{border-color:rgba(255,92,107,.4);color:var(--red)}
.toast.info{border-color:rgba(56,189,248,.4);color:var(--blue)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-b));animation:slideUp .25s ease}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* Tabs within a page */
.tab-pills{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tab-pills::-webkit-scrollbar{display:none}
.tab-pill{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* Progress bar */
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}
/* Row items */
.row-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.row-left{display:flex;flex-direction:column;gap:2px}
.row-right{display:flex;align-items:center;gap:8px}
/* Donut */
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center}
/* Setup */
.setup-wrap{flex:1;padding:24px;overflow-y:auto}
.setup-step{max-width:400px;margin:0 auto}
.setup-title{font-size:26px;font-weight:800;margin-bottom:8px}
.setup-sub{color:var(--muted);font-size:15px;margin-bottom:28px;line-height:1.6}
/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:12px}
.empty-icon{font-size:48px}
.empty h3{font-size:18px;font-weight:700}
.empty p{color:var(--muted);font-size:14px;line-height:1.6}
/* Chip */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
/* Scroll fix for desktop */
@media(min-width:600px){.bnav,.bnav-fab{left:50%;transform:translateX(-50%)}}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── Supabase ── */
const SURL='https://whlfnlqzfakkbjmkpfwj.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndobGZubHF6ZmFra2JqbWtwZndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM2MzYsImV4cCI6MjA5NDEyOTYzNn0.DeNchaLR4RTQsVQzC_XB1PgH86AZ9MtB5yz1HV92EhM';
const{createClient}=window.supabase;
const db=createClient(SURL,SKEY);

/* ── Defaults (all de-personalized) ── */
const DEF_CATS=[
  {name:'Housing',color:'#6c63ff',icon:'🏠'},
  {name:'Food & Dining',color:'#ff7675',icon:'🍔'},
  {name:'Groceries',color:'#fdcb6e',icon:'🛒'},
  {name:'Transportation',color:'#00b894',icon:'🚗'},
  {name:'Utilities',color:'#0984e3',icon:'💡'},
  {name:'Healthcare',color:'#e17055',icon:'🏥'},
  {name:'Entertainment',color:'#a29bfe',icon:'🎮'},
  {name:'Shopping',color:'#fd79a8',icon:'🛍️'},
  {name:'Personal Care',color:'#55efc4',icon:'💆'},
  {name:'Savings',color:'#00cec9',icon:'🐖'},
  {name:'Other',color:'#636e72',icon:'📦'},
];
const DEF_QL=[
  {id:'q1',label:'Groceries',amount:0,category:'Groceries',account:'Checking'},
  {id:'q2',label:'Gas',amount:0,category:'Transportation',account:'Checking'},
  {id:'q3',label:'Dining',amount:0,category:'Food & Dining',account:'Checking'},
  {id:'q4',label:'Coffee',amount:0,category:'Food & Dining',account:'Checking'},
];
const DEF_ACCTS=['Checking','Savings','Credit Card','Cash'];
const DEF_FREQ='semimonthly'; // semimonthly | biweekly | weekly | monthly

/* ── Helpers ── */
const fmt=n=>n==null?'$0':'$'+Math.abs(Number(n)).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDec=n=>n==null?'$0.00':'$'+Math.abs(Number(n)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(d,n)=>{const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)};
const monthLabel=d=>new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',year:'2-digit'});
const dayLabel=d=>new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});

function nextDueDate(dayOfMonth){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  let d=new Date(y,m,dayOfMonth);
  if(d<=now) d=new Date(y,m+1,dayOfMonth);
  return d;
}
function daysUntil(date){
  const diff=new Date(date)-new Date();
  return Math.ceil(diff/(1000*60*60*24));
}

function calcSinglePayoff(balance,monthlyPayment,annualRate){
  if(!balance||!monthlyPayment) return null;
  let bal=parseFloat(balance);
  const pmt=parseFloat(monthlyPayment);
  const rate=parseFloat(annualRate||0)/100/12;
  let months=0;
  while(bal>0&&months<600){
    bal=bal+bal*rate-pmt;
    months++;
  }
  if(months>=600) return null;
  const dt=new Date();
  dt.setMonth(dt.getMonth()+months);
  return{months,date:dt};
}

function calcPayoffTimeline(debts){
  if(!debts||!debts.length) return [];
  const active=debts.filter(d=>d.current_balance>0&&d.monthly_payment>0)
    .map(d=>({...d,bal:parseFloat(d.current_balance),pmt:parseFloat(d.monthly_payment),rate:parseFloat(d.interest_rate||0)/100/12}))
    .sort((a,b)=>a.bal-b.bal); // snowball by default
  const events=[];
  let extra=0;
  const now=new Date();
  active.forEach(debt=>{
    let bal=debt.bal;
    const pmt=debt.pmt+extra;
    let months=0;
    while(bal>0&&months<360){
      const interest=bal*debt.rate;
      bal=bal+interest-pmt;
      months++;
    }
    const dt=new Date(now);
    dt.setMonth(dt.getMonth()+months);
    const freed=debt.pmt;
    events.push({
      date:dt.toISOString().slice(0,10),
      months,
      event:`${debt.name} paid off`,
      sub:`Frees up ${fmt(freed)}/mo`,
      color:debt.color||'#6c63ff',
      freed,
    });
    extra+=freed;
  });
  return events;
}

/* ── Data Layer ── */
const D={
  async getAll(uid){
    const q=t=>db.from(t).select('*').or(`user_id.eq.${uid},user_id.is.null`);
    const qOwn=t=>db.from(t).select('*').eq('user_id',uid);
    const [txR,catR,fiR,qlR,debtR,acctR,setR,budR,incR,goalR]=await Promise.all([
      q('transactions'),q('categories'),q('fixed_items'),q('quick_log_items'),
      q('debts'),q('accounts'),q('settings'),q('budget_targets'),
      qOwn('income_events'),qOwn('savings_goals'),
    ]);
    return{
      transactions:txR.data||[],categories:catR.data||[],
      fixed_items:fiR.data||[],quick_log_items:qlR.data||[],
      debts:debtR.data||[],accounts:acctR.data||[],
      settings:setR.data||[],budget_targets:budR.data||[],
      income_events:incR.data||[],savings_goals:goalR.data||[],
    };
  },
  async hasLegacyData(){
    const{data}=await db.from('transactions').select('id').is('user_id',null).limit(1);
    return data&&data.length>0;
  },
  async claimLegacyData(uid){
    const tables=['transactions','categories','fixed_items','quick_log_items','debts','accounts','settings','budget_targets'];
    for(const t of tables){
      await db.from(t).update({user_id:uid}).is('user_id',null);
    }
  },
  async needsSetup(uid){
    const{data}=await db.from('settings').select('id').eq('id','setup_complete').eq('user_id',uid).limit(1);
    return !data||data.length===0;
  },
  async fullSetup(uid){
    // categories
    const cats=DEF_CATS.map(c=>({...c,user_id:uid}));
    const catRes=await db.from('categories').insert(cats);
    if(catRes.error) console.error('categories insert failed:',catRes.error);
    // quick log
    const ql=DEF_QL.map(q=>({name:q.label,category:q.category,default_amount:q.amount||null,account:q.account,user_id:uid}));
    await db.from('quick_log_items').insert(ql);
    // accounts
    for(const name of DEF_ACCTS){
      await db.from('accounts').insert({id:crypto.randomUUID(),name,balance:0,type:'checking',user_id:uid});
    }
    // settings
    await D.setSetting('pay_frequency',DEF_FREQ,uid);
    await D.setSetting('pay_per_check','0',uid);
    // Mark setup as complete — this is what needsSetup checks
    await D.setSetting('setup_complete','true',uid);
  },
  async getSetting(key,uid,all){
    const rows=all||(await db.from('settings').select('*').or(`user_id.eq.${uid},user_id.is.null`)).data||[];
    const r=rows.find(r=>r.key===key||r.id===key);
    return r?r.value:null;
  },
  async setSetting(key,value,uid){
    await db.from('settings').delete().eq('id',key).eq('user_id',uid);
    await db.from('settings').insert({id:key,key,value,user_id:uid});
  },
  async setBudget(cat,amt,uid){
    await db.from('budget_targets').delete().eq('category',cat).eq('user_id',uid);
    await db.from('budget_targets').insert({id:crypto.randomUUID(),category:cat,monthly_amount:amt,user_id:uid});
  },
  async addTx(t,uid){
    const{data,error}=await db.from('transactions').insert({...t,user_id:uid}).select().single();
    return{data,error};
  },
  async updateTx(id,changes){
    return db.from('transactions').update(changes).eq('id',id);
  },
  async deleteTx(id){
    return db.from('transactions').delete().eq('id',id);
  },
  async addDebt(d,uid){
    return db.from('debts').insert({...d,user_id:uid});
  },
  async updateDebt(id,changes){
    return db.from('debts').update(changes).eq('id',id);
  },
  async deleteDebt(id){
    return db.from('debts').delete().eq('id',id);
  },
  async addFixedItem(f,uid){
    return db.from('fixed_items').insert({...f,user_id:uid});
  },
  async updateFixedItem(id,changes){
    return db.from('fixed_items').update(changes).eq('id',id);
  },
  async deleteFixedItem(id){
    return db.from('fixed_items').delete().eq('id',id);
  },
  async addIncomeEvent(ev,uid){
    return db.from('income_events').insert({...ev,id:crypto.randomUUID(),user_id:uid});
  },
  async upsertGoal(g,uid){
    if(g.id){
      return db.from('savings_goals').update({...g,user_id:uid}).eq('id',g.id);
    }else{
      return db.from('savings_goals').insert({...g,id:crypto.randomUUID(),user_id:uid});
    }
  },
  async deleteGoal(id){
    return db.from('savings_goals').delete().eq('id',id);
  },
  async updateAccount(id,changes){
    return db.from('accounts').update(changes).eq('id',id);
  },
  async addAccount(a,uid){
    return db.from('accounts').insert({...a,id:crypto.randomUUID(),user_id:uid});
  },
  async exportData(uid){
    const d=await D.getAll(uid);
    return{exported_at:new Date().toISOString(),version:2,...d};
  },
  async importData(json,uid){
    // Wipe existing user data first
    const tables=['transactions','categories','fixed_items','quick_log_items','debts','accounts','settings','budget_targets','income_events','savings_goals'];
    for(const t of tables) await db.from(t).delete().eq('user_id',uid);
    // Re-insert with new uid
    const strip=rows=>(rows||[]).map(r=>{const{id,...rest}=r;return{...rest,user_id:uid}});
    const stripKeepId=rows=>(rows||[]).map(r=>({...r,user_id:uid}));
    if(json.categories?.length) await db.from('categories').insert(strip(json.categories));
    if(json.accounts?.length) await db.from('accounts').insert(stripKeepId(json.accounts));
    if(json.settings?.length) await db.from('settings').insert(stripKeepId(json.settings));
    if(json.budget_targets?.length) await db.from('budget_targets').insert(stripKeepId(json.budget_targets));
    if(json.quick_log_items?.length) await db.from('quick_log_items').insert(strip(json.quick_log_items));
    if(json.fixed_items?.length) await db.from('fixed_items').insert(strip(json.fixed_items));
    if(json.debts?.length) await db.from('debts').insert(strip(json.debts));
    if(json.transactions?.length) await db.from('transactions').insert(strip(json.transactions));
    if(json.income_events?.length) await db.from('income_events').insert(strip(json.income_events));
    if(json.savings_goals?.length) await db.from('savings_goals').insert(strip(json.savings_goals));
  },
};

/* ── Feature Helpers ── */
function calcCashFlow(data){
  const{transactions=[],income_events=[],fixed_items=[],settings=[]}=data;
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  const mKey=`${y}-${String(m+1).padStart(2,'0')}`;
  const todayStr=today();
  const incomeThisMonth=income_events.filter(e=>e.date?.startsWith(mKey)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const spentThisMonth=transactions.filter(t=>t.date?.startsWith(mKey)&&t.type!=='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const freq=settings.find(s=>(s.key||s.id)==='pay_frequency')?.value||'semimonthly';
  const perCheck=parseFloat(settings.find(s=>(s.key||s.id)==='pay_per_check')?.value||0)||0;
  let remainingPaychecks=0;
  if(perCheck>0&&freq==='semimonthly'){
    const p1=`${y}-${String(m+1).padStart(2,'0')}-01`;
    const p15=`${y}-${String(m+1).padStart(2,'0')}-15`;
    if(p1>todayStr) remainingPaychecks++;
    if(p15>todayStr) remainingPaychecks++;
  }
  const billsRemaining=fixed_items.filter(f=>{
    if(!f.due_day||!f.amount) return false;
    const dd=`${y}-${String(m+1).padStart(2,'0')}-${String(f.due_day).padStart(2,'0')}`;
    return dd>todayStr&&dd.startsWith(mKey);
  }).reduce((s,f)=>s+parseFloat(f.amount||0),0);
  return{incomeThisMonth,expectedIncome:incomeThisMonth+remainingPaychecks*perCheck,spentThisMonth,billsRemaining,remainingPaychecks,projected:(incomeThisMonth+remainingPaychecks*perCheck)-spentThisMonth-billsRemaining,perCheck};
}

function calcNetWorth(data){
  const{accounts=[],debts=[]}=data;
  const assets=accounts.reduce((s,a)=>s+parseFloat(a.balance||0),0);
  const liabilities=debts.filter(d=>d.current_balance>0).reduce((s,d)=>s+parseFloat(d.current_balance||0),0);
  return{assets,liabilities,netWorth:assets-liabilities};
}

function findRecurring(transactions){
  const groups={};
  transactions.forEach(t=>{
    if(!t.amount||!t.date||parseFloat(t.amount)<=0) return;
    const desc=(t.description||'').toUpperCase().replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim().slice(0,25);
    if(desc.length<3) return;
    const month=t.date.slice(0,7);
    if(!groups[desc]) groups[desc]={desc,months:new Set(),amounts:[],category:t.category};
    groups[desc].months.add(month);
    groups[desc].amounts.push(parseFloat(t.amount));
  });
  return Object.values(groups).filter(g=>g.months.size>=2).map(g=>({
    desc:g.desc.charAt(0)+g.desc.slice(1).toLowerCase(),
    avgAmount:g.amounts.reduce((s,a)=>s+a,0)/g.amounts.length,
    months:g.months.size,category:g.category,
  })).sort((a,b)=>b.avgAmount-a.avgAmount).slice(0,12);
}

function calcRollover(cat,budget_targets,transactions){
  const now=new Date();
  const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lmKey=`${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}`;
  const budget=parseFloat(budget_targets.find(b=>b.category===cat)?.monthly_amount||0);
  if(!budget) return 0;
  const spent=transactions.filter(t=>t.date?.startsWith(lmKey)&&t.category===cat&&t.type!=='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  return Math.max(0,Math.round((budget-spent)*100)/100);
}

/* ── Auto Paycheck Logger ── */
async function autoLogPaychecks(data,uid){
  const settings=data.settings||[];
  const incomeEvents=data.income_events||[];
  const perCheck=parseFloat(settings.find(s=>(s.key||s.id)==='pay_per_check')?.value||0);
  const freq=settings.find(s=>(s.key||s.id)==='pay_frequency')?.value||'semimonthly';
  if(perCheck<=0) return false;

  const todayStr=today();
  const start=new Date();start.setMonth(start.getMonth()-3);

  // Build list of expected pay dates
  const payDates=[];
  if(freq==='semimonthly'){
    const cur=new Date(start.getFullYear(),start.getMonth(),1);
    while(cur<=new Date()){
      const y=cur.getFullYear(),m=String(cur.getMonth()+1).padStart(2,'0');
      payDates.push(`${y}-${m}-01`,`${y}-${m}-15`);
      cur.setMonth(cur.getMonth()+1);
    }
  }else if(freq==='monthly'){
    const cur=new Date(start.getFullYear(),start.getMonth(),1);
    while(cur<=new Date()){
      const y=cur.getFullYear(),m=String(cur.getMonth()+1).padStart(2,'0');
      payDates.push(`${y}-${m}-01`);
      cur.setMonth(cur.getMonth()+1);
    }
  }else if(freq==='biweekly'){
    const cur=new Date(start);
    while(cur<=new Date()){payDates.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+14);}
  }else if(freq==='weekly'){
    const cur=new Date(start);
    while(cur<=new Date()){payDates.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+7);}
  }

  // Find last logged paycheck date — only auto-add dates after that
  const lastPaycheckDate=incomeEvents
    .filter(e=>e.type==='paycheck')
    .map(e=>e.date)
    .sort()
    .pop()||null;

  // Filter to past dates after the last paycheck (with ±4 day dedup window)
  const toLog=payDates.filter(pd=>{
    if(pd>todayStr) return false;
    // Skip anything on or before the last logged paycheck
    if(lastPaycheckDate&&pd<=lastPaycheckDate) return false;
    const pdMs=new Date(pd+'T12:00').getTime();
    // Don't add if a paycheck already exists within ±4 days
    return !incomeEvents.some(e=>{
      if(e.type!=='paycheck') return false;
      return Math.abs(new Date(e.date+'T12:00').getTime()-pdMs)<=345600000;
    });
  });

  for(const pd of toLog){
    await D.addIncomeEvent({type:'paycheck',amount:perCheck,date:pd,account:'Checking',note:'Auto-logged'},uid);
  }
  return toLog.length>0;
}

/* ── Charts ── */
function DonutChart({segments,size=120,thick=18,center}){
  const r=size/2-thick/2;
  const circ=2*Math.PI*r;
  let offset=0;
  const total=segments.reduce((s,x)=>s+(x.value||0),0)||1;
  return(
    <div className="donut-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        {segments.map((seg,i)=>{
          const pct=(seg.value||0)/total;
          const dash=pct*circ;
          const el=<circle key={i} r={r} cx={size/2} cy={size/2}
            fill="none" stroke={seg.color||'#6c63ff'} strokeWidth={thick}
            strokeDasharray={`${dash} ${circ-dash}`}
            strokeDashoffset={-offset*circ}
            style={{transform:'rotate(-90deg)',transformOrigin:'center'}}
          />;
          offset+=pct;
          return el;
        })}
        {!segments.length&&<circle r={r} cx={size/2} cy={size/2} fill="none" stroke="var(--border)" strokeWidth={thick}/>}
      </svg>
      {center&&<div className="donut-center">{center}</div>}
    </div>
  );
}
function SVGBarChart({data,height=120,color='#6c63ff',showAmounts,incomeLine}){
  if(!data||!data.length) return null;
  const n=data.length;
  const allVals=[...data.map(d=>d.value||0),...(incomeLine||[]).map(v=>v||0)];
  const max=Math.max(...allVals)||1;
  const w=300,pad=4;
  const colW=(w-(pad*(n+1)))/n;
  const bottomPad=showAmounts?28:14;
  const topPad=16;
  const chartH=height-bottomPad-topPad;

  // Income line points
  const linePoints=incomeLine?incomeLine.map((v,i)=>{
    const cx=pad+(i*colW)+(i*pad)+colW/2;
    const y=topPad+chartH*(1-(v||0)/max);
    return[cx,y];
  }):[];
  const linePath=linePoints.length>1?'M'+linePoints.map(p=>p.join(',')).join(' L'):'';

  return(
    <svg viewBox={`0 0 ${w} ${height}`} style={{width:'100%',height:'auto'}}>
      {data.map((d,i)=>{
        const x=pad+(i*colW)+(i*pad);
        const cx=x+colW/2;
        const bh=Math.max(2,((d.value||0)/max)*chartH);
        const y=topPad+chartH-bh;
        const amt=d.value>=1000?`${(d.value/1000).toFixed(1)}k`:Math.round(d.value);
        return(
          <g key={i}>
            <rect x={x} y={y} width={colW} height={bh} rx={3} fill={d.color||color} opacity={0.85}/>
            <text x={cx} y={height-bottomPad+11} textAnchor="middle" fill="var(--muted)" fontSize="9">{d.label}</text>
            {showAmounts&&d.value>0&&<text x={cx} y={height-2} textAnchor="middle" fill="var(--text)" fontSize="8.5" fontWeight="700">{amt}</text>}
          </g>
        );
      })}
      {linePath&&<>
        <path d={linePath} fill="none" stroke="rgba(0,212,170,0.9)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {linePoints.map(([cx,y],i)=>(
          <circle key={i} cx={cx} cy={y} r="3.5" fill="var(--bg)" stroke="rgba(0,212,170,1)" strokeWidth="2"/>
        ))}
      </>}
    </svg>
  );
}
function SVGLineChart({data,height=80,color='#6c63ff'}){
  if(!data||data.length<2) return null;
  const vals=data.map(d=>d.value||0);
  const max=Math.max(...vals)||1;
  const min=Math.min(...vals);
  const range=max-min||1;
  const w=300,pad=8;
  const pts=data.map((d,i)=>{
    const x=pad+i*(w-pad*2)/(data.length-1);
    const y=pad+(1-(d.value-min)/range)*(height-pad*2);
    return[x,y];
  });
  const path='M'+pts.map(p=>p.join(',')).join(' L');
  return(
    <svg viewBox={`0 0 ${w} ${height}`} style={{width:'100%',height}}>
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="3" fill={color}/>)}
    </svg>
  );
}

/* ── Toast ── */
function useToast(){
  const[toasts,setToasts]=useState([]);
  const toast_=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  const ToastContainer=()=>(
    <div className="toast-wrap">
      {toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
  return{toast_,ToastContainer};
}

function AuthScreen({onAuth}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[showPass,setShowPass]=useState(false);
  const[remember,setRemember]=useState(true);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');
  const{toast_,ToastContainer}=useToast();

  async function submit(e){
    e.preventDefault();
    setBusy(true);setErr('');
    try{
      if(mode==='login'){
        const{data,error}=await db.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
        if(!remember){
          // Set short session if not remembering
          await db.auth.updateUser({});
        }
        onAuth(data.user);
      }else{
        const{data,error}=await db.auth.signUp({email,password:pass});
        if(error) throw error;
        if(data.user&&!data.user.email_confirmed_at){
          setErr('Check your email to confirm your account, then log in.');
          setBusy(false);return;
        }
        onAuth(data.user);
      }
    }catch(e){setErr(e.message||'Something went wrong');}
    setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <ToastContainer/>
      <div className="auth-card">
        <div className="auth-title">💰 Budget</div>
        <div className="auth-sub">{mode==='login'?'Sign in to your account':'Create your free account'}</div>
        <form onSubmit={submit}>
          <div className="field">
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required autoComplete="email"/>
          </div>
          <div className="field">
            <label>Password</label>
            <div style={{position:'relative'}}>
              <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required autoComplete={mode==='login'?'current-password':'new-password'} minLength={6} style={{paddingRight:44}}/>
              <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:18,padding:0}}>
                {showPass?'🙈':'👁️'}
              </button>
            </div>
          </div>
          {mode==='login'&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,cursor:'pointer'}} onClick={()=>setRemember(r=>!r)}>
              <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${remember?'var(--accent)':'var(--border)'}`,background:remember?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
                {remember&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <span style={{fontSize:14,color:'var(--muted)',userSelect:'none'}}>Keep me signed in</span>
            </div>
          )}
          {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
          <button className="btn btn-primary" type="submit" disabled={busy}>
            {busy?'Please wait…':mode==='login'?'Sign In':'Create Account'}
          </button>
        </form>
        <div className="auth-toggle">
          {mode==='login'?<>Don't have an account? <button onClick={()=>{setMode('signup');setErr('')}}>Sign up</button></>
            :<>Already have an account? <button onClick={()=>{setMode('login');setErr('')}}>Sign in</button></>}
        </div>
      </div>
    </div>
  );
}

function IncomeModal({uid,accounts,onSave,onClose,toast_}){

/* ── Spending Insights ── */
function SpendingInsights({data}){
  const{transactions=[],budget_targets=[]}=data;
  const now=new Date();
  const mKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lmKey=`${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}`;
  const thisM={},lastM={};
  transactions.forEach(t=>{
    if(t.type==='income') return;
    if(t.date?.startsWith(mKey)) thisM[t.category]=(thisM[t.category]||0)+parseFloat(t.amount||0);
    if(t.date?.startsWith(lmKey)) lastM[t.category]=(lastM[t.category]||0)+parseFloat(t.amount||0);
  });
  const insights=[];
  Object.entries(thisM).forEach(([cat,spent])=>{
    const last=lastM[cat]||0;
    const budget=parseFloat(budget_targets.find(b=>b.category===cat)?.monthly_amount||0);
    if(budget>0&&spent>=budget) insights.push({type:'red',text:`${cat} over budget (${fmt(spent-budget)} over)`});
    else if(budget>0&&spent>=budget*0.8) insights.push({type:'amber',text:`${cat} at ${Math.round(spent/budget*100)}% of budget`});
    if(last>0&&spent>last*1.25&&spent-last>40) insights.push({type:'amber',text:`${cat} up ${fmt(spent-last)} vs last month`});
  });
  Object.entries(lastM).forEach(([cat,last])=>{
    const curr=thisM[cat]||0;
    if(last>100&&curr<last*0.75) insights.push({type:'green',text:`${cat} down ${fmt(last-curr)} vs last month 👍`});
  });
  if(!insights.length) return null;
  return(
    <div style={{marginBottom:12}}>
      <div className="section-title">💡 Insights</div>
      {insights.slice(0,3).map((ins,i)=>(
        <div key={i} style={{padding:'8px 12px',borderRadius:8,marginBottom:6,fontSize:13,fontWeight:500,
          background:ins.type==='red'?'rgba(255,92,107,.1)':ins.type==='amber'?'rgba(255,184,77,.1)':'rgba(74,222,128,.1)',
          color:ins.type==='red'?'var(--red)':ins.type==='amber'?'var(--amber)':'var(--green)',
          border:`1px solid ${ins.type==='red'?'rgba(255,92,107,.25)':ins.type==='amber'?'rgba(255,184,77,.25)':'rgba(74,222,128,.25)'}`}}>
          {ins.text}
        </div>
      ))}
    </div>
  );
}

/* ── Year in Review ── */
function YearInReview({data}){
  const{transactions=[],income_events=[],categories=[]}=data;
  const year=new Date().getFullYear();
  const ytdTx=transactions.filter(t=>t.date?.startsWith(String(year))&&t.type!=='income');
  const ytdIncome=income_events.filter(e=>e.date?.startsWith(String(year)));
  if(ytdTx.length===0) return null;
  const totalSpent=ytdTx.reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const totalIncome=ytdIncome.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const catSpend={};
  ytdTx.forEach(t=>{catSpend[t.category]=(catSpend[t.category]||0)+parseFloat(t.amount||0)});
  const topCats=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const monthlySpend={};
  ytdTx.forEach(t=>{const mk=t.date?.slice(0,7);if(mk) monthlySpend[mk]=(monthlySpend[mk]||0)+parseFloat(t.amount||0)});
  const months=Object.entries(monthlySpend).sort((a,b)=>a[0].localeCompare(b[0]));
  const bestMonth=months.length?months.reduce((b,m)=>m[1]<b[1]?m:b):null;
  const worstMonth=months.length?months.reduce((w,m)=>m[1]>w[1]?m:w):null;
  return(
    <div className="card" style={{marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>📅 {year} Year to Date</div>
      <div className="grid2" style={{marginBottom:8}}>
        <MCard label="Spent" val={fmt(totalSpent)} color="var(--red)" small/>
        <MCard label="Earned" val={fmt(totalIncome)} color="var(--green)" small/>
      </div>
      <MCard label="Net" val={(totalIncome-totalSpent>=0?'+':'')+fmt(Math.abs(totalIncome-totalSpent))} color={totalIncome-totalSpent>=0?'var(--green)':'var(--red)'} small/>
      <div style={{marginTop:12}}>
        <div className="section-title" style={{marginTop:8}}>Top Categories</div>
        {topCats.map(([cat,amt],i)=>{
          const c=categories.find(x=>x.name===cat);
          return(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span>{c?.emoji||'📦'}</span>
                <span style={{fontSize:13}}>{cat}</span>
              </div>
              <span style={{fontWeight:700,fontSize:13}}>{fmt(amt)}</span>
            </div>
          );
        })}
      </div>
      {bestMonth&&worstMonth&&<div style={{display:'flex',gap:8,marginTop:12}}>
        <div style={{flex:1,background:'rgba(74,222,128,.1)',borderRadius:8,padding:'8px 10px'}}>
          <div style={{fontSize:10,color:'var(--muted)'}}>LOWEST MONTH</div>
          <div style={{fontWeight:700,fontSize:13}}>{monthLabel(bestMonth[0]+'-01')}</div>
          <div style={{fontSize:12,color:'var(--green)'}}>{fmt(bestMonth[1])}</div>
        </div>
        <div style={{flex:1,background:'rgba(255,92,107,.1)',borderRadius:8,padding:'8px 10px'}}>
          <div style={{fontSize:10,color:'var(--muted)'}}>HIGHEST MONTH</div>
          <div style={{fontWeight:700,fontSize:13}}>{monthLabel(worstMonth[0]+'-01')}</div>
          <div style={{fontSize:12,color:'var(--red)'}}>{fmt(worstMonth[1])}</div>
        </div>
      </div>}
    </div>
  );
}

/* ══════════════════════════════════════════════

function DashTab({data,uid,onAdd,onAddIncome,toast_}){
  const{transactions=[],fixed_items=[],income_events=[],accounts=[],categories=[],settings=[],savings_goals=[]}=data;

  // Current month
  const now=new Date();
  const mStart=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const mTx=transactions.filter(t=>t.date>=mStart&&t.type!=='income');
  const mSpend=mTx.reduce((s,t)=>s+parseFloat(t.amount||0),0);

  // Income this month
  const mIncome=income_events
    .filter(e=>e.date>=mStart)
    .reduce((s,e)=>s+parseFloat(e.amount||0),0);

  // Last paycheck
  const lastPay=income_events
    .filter(e=>e.type==='paycheck')
    .sort((a,b)=>b.date.localeCompare(a.date))[0];

  // Per-check estimate from settings
  const perCheckSetting=parseFloat(settings.find(s=>(s.key||s.id)==='pay_per_check')?.value||0)||0;

  // Net this month
  const net=mIncome-mSpend;

  // Status
  let statusColor='green',statusMsg='',statusIcon='✅';
  if(net<0){statusColor='red';statusMsg=`Spending ${fmt(Math.abs(net))} more than earned this month`;statusIcon='⚠️';}
  else if(mIncome===0){statusColor='blue';statusMsg='Log your income to see your status';statusIcon='💡';}
  else if(net/mIncome<0.1){statusColor='amber';statusMsg=`Almost even — ${fmt(net)} remaining`;statusIcon='📊';}
  else{statusMsg=`${fmt(net)} ahead this month`;statusIcon='✅';}

  // Upcoming bills
  const todayStr=today();
  const upcoming=fixed_items
    .filter(f=>f.due_day&&f.amount>0)
    .map(f=>{
      const dd=nextDueDate(parseInt(f.due_day));
      return{...f,nextDue:dd,daysAway:daysUntil(dd)};
    })
    .filter(f=>f.daysAway<=14)
    .sort((a,b)=>a.daysAway-b.daysAway);

  // Spending by category donut
  const catSpend={};
  mTx.forEach(t=>{catSpend[t.category]=(catSpend[t.category]||0)+parseFloat(t.amount||0)});
  const donutSegs=Object.entries(catSpend).map(([cat,val])=>{
    const c=categories.find(x=>x.name===cat);
    return{label:cat,value:val,color:c?.color||'#6c63ff'};
  }).sort((a,b)=>b.value-a.value).slice(0,6);

  return(
    <div>
      {/* Cash flow forecast */}
      <CashFlowCard data={data}/>

      {/* Spending insights */}
      <SpendingInsights data={data}/>

      {/* Status banner */}
      <div className={`sbanner ${statusColor}`}>
        <span style={{fontSize:20}}>{statusIcon}</span>
        <span>{statusMsg||'Good job keeping track!'}</span>
      </div>

      {/* Key metrics */}
      <div className="grid2">
        <MCard label="Spent This Month" val={fmt(mSpend)} sub={`of ${mIncome?fmt(mIncome):'no income logged'}`} color="var(--red)"/>
        <MCard label="Income This Month" val={fmt(mIncome)} sub={lastPay?`Last: ${dayLabel(lastPay.date)}`:'Tap + to log'} color="var(--green)"/>
      </div>
      <div className="grid2">
        <MCard label="Net" val={(net>=0?'+':'-')+fmt(Math.abs(net))} sub="income minus spending" color={net>=0?'var(--green)':'var(--red)'}/>
        <MCard label="Transactions" val={mTx.length} sub="this month"/>
      </div>

      {/* Quick actions */}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className="btn btn-primary" onClick={onAdd} style={{flex:1}}>+ Log Expense</button>
        <button className="btn btn-secondary" onClick={onAddIncome} style={{flex:1}}>+ Log Income</button>
      </div>

      {/* Upcoming bills */}
      {upcoming.length>0&&(
        <div className="card">
          <div className="section-title">⏰ Coming Up (14 days)</div>
          {upcoming.map((f,i)=>(
            <div key={i} className="bill-row">
              <div className="bill-info">
                <div className="bill-name">{f.name}</div>
                <div className={`bill-due${f.daysAway<=3?' bill-overdue':f.daysAway<=7?' bill-soon':''}`}>
                  {f.daysAway===0?'Due today':f.daysAway===1?'Due tomorrow':`Due in ${f.daysAway} days`} · {f.account||''}
                </div>
              </div>
              <div className="bill-amt">{fmt(f.amount)}</div>
            </div>
          ))}
        </div>
      )}

      {/* Spending donut */}
      {donutSegs.length>0&&(
        <div className="card">
          <div className="section-title">This Month by Category</div>
          <div style={{display:'flex',alignItems:'center',gap:20}}>
            <DonutChart segments={donutSegs} size={120} center={
              <><div style={{fontWeight:800,fontSize:15}}>{fmt(mSpend)}</div><div style={{fontSize:10,color:'var(--muted)'}}>spent</div></>
            }/>
            <div style={{flex:1}}>
              {donutSegs.map((s,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <span style={{fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:110}}>{s.label}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:600}}>{fmt(s.value)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Savings goals preview */}
      {savings_goals.filter(g=>!g.archived).length>0&&(
        <div className="card">
          <div className="section-title">🎯 Savings Goals</div>
          {savings_goals.filter(g=>!g.archived).slice(0,3).map(g=>{
            const pct=g.target_amount?Math.round((g.current_amount/g.target_amount)*100):0;
            return(
              <div key={g.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{fontWeight:600}}>{g.emoji||'🎯'} {g.name}</span>
                  <span style={{fontSize:13,color:'var(--muted)'}}>{fmt(g.current_amount)} / {fmt(g.target_amount)}</span>
                </div>
                <ProgBar pct={pct} color={g.color||'var(--accent)'}/>
              </div>
            );
          })}
        </div>
      )}

      {transactions.length===0&&mIncome===0&&(
        <Empty h="Fresh start!" msg="Log your first expense or income to get started." icon="🚀"/>
      )}
    </div>
  );
}

function TransTab({data,uid,onAdd,toast_,reload}){
  const{transactions=[],categories=[]}=data;
  const[search,setSearch]=useState('');
  const[filter,setFilter]=useState('all');
  const[deleting,setDeleting]=useState(null);

  const months=useMemo(()=>{
    const s=new Set(transactions.map(t=>t.date?.slice(0,7)));
    return['all',...[...s].sort().reverse()];
  },[transactions]);

  const visible=useMemo(()=>{
    let tx=[...transactions].sort((a,b)=>b.date?.localeCompare(a.date));
    if(filter!=='all') tx=tx.filter(t=>t.date?.startsWith(filter));
    if(search) tx=tx.filter(t=>(t.description||'').toLowerCase().includes(search.toLowerCase())||(t.category||'').toLowerCase().includes(search.toLowerCase()));
    return tx;
  },[transactions,filter,search]);

  async function del(id){
    setDeleting(id);
    await D.deleteTx(id);
    toast_('Deleted','success');
    await reload();
    setDeleting(null);
  }

  return(
    <div>
      <div className="field" style={{marginBottom:8}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search transactions…"/>
      </div>
      <div className="tab-pills">
        {months.slice(0,6).map(m=>(
          <button key={m} className={`tab-pill${filter===m?' active':''}`} onClick={()=>setFilter(m)}>
            {m==='all'?'All':monthLabel(m+'-01')}
          </button>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{color:'var(--muted)',fontSize:13}}>{visible.length} transactions</div>
        <button className="btn btn-primary btn-sm" onClick={onAdd}>+ Add</button>
      </div>
      {visible.length===0&&<Empty h="No transactions" msg="Nothing matches your filter." icon="🔍"/>}
      {visible.map(t=>{
        const c=categories.find(x=>x.name===t.category);
        return(
          <div key={t.id} className="card-sm" style={{marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:24}}>{c?.icon||'📦'}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:15}}>{t.description}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{t.category} · {dayLabel(t.date)} · {t.account}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:700,color:t.type==='income'?'var(--green)':'var(--text)'}}>{t.type==='income'?'+':''}{fmt(t.amount)}</div>
              <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12,padding:'2px 0'}} onClick={()=>del(t.id)} disabled={deleting===t.id}>{deleting===t.id?'…':'✕'}</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════

function IncomeTab({data,uid,onAdd,toast_,reload}){
  const{income_events=[],settings=[]}=data;
  const perCheck=parseFloat(settings.find(s=>(s.key||s.id)==='pay_per_check')?.value||0)||0;
  const freq=settings.find(s=>(s.key||s.id)==='pay_frequency')?.value||'semimonthly';

  const sorted=[...income_events].sort((a,b)=>b.date.localeCompare(a.date));
  const totalYear=income_events.filter(e=>{
    const y=new Date().getFullYear();
    return e.date.startsWith(String(y));
  }).reduce((s,e)=>s+parseFloat(e.amount||0),0);

  const totalMonth=income_events.filter(e=>{
    const now=new Date();
    return e.date.startsWith(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);

  const byType={paycheck:0,bonus:0,other:0};

          <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{freq} · change in Settings</div>

      )}
      <div className="grid3">
        <div className="card-sm" style={{textAlign:'center'}}>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Paychecks</div>
          <div style={{fontWeight:700}}>{fmt(byType.paycheck)}</div>
        </div>
        <div className="card-sm" style={{textAlign:'center'}}>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Bonuses</div>
          <div style={{fontWeight:700,color:'var(--accent2)'}}>{fmt(byType.bonus)}</div>
        </div>
        <div className="card-sm" style={{textAlign:'center'}}>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Other</div>
          <div style={{fontWeight:700,color:'var(--amber)'}}>{fmt(byType.other)}</div>

          <div style={{flex:1}}>
            <div style={{fontWeight:600}}>{e.note||e.type.charAt(0).toUpperCase()+e.type.slice(1)}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{dayLabel(e.date)} · {e.account}</div>

          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:700,color:'var(--green)'}}>+{fmt(e.amount)}</div>

      ))}

  );
}

/* ══════════════════════════════════════════════
   BUDGET TAB
══════════════════════════════════════════════ */
function BudgetTab({data,uid,toast_,reload}){
  const{transactions=[],categories=[],budget_targets=[],fixed_items=[],settings=[]}=data;
  const[sub,setSub]=useState('spend');
  const[editBudget,setEditBudget]=useState(null);
  const[editFixed,setEditFixed]=useState(null);
  const[newFixed,setNewFixed]=useState(false);

  const now=new Date();
  const mStart=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const mTx=transactions.filter(t=>t.date>=mStart&&t.type!=='income');

  const catSpend={};
  mTx.forEach(t=>{catSpend[t.category]=(catSpend[t.category]||0)+parseFloat(t.amount||0)});

  const budgeted=budget_targets.reduce((s,b)=>s+parseFloat(b.monthly_amount||0),0);
  const totalFixed=fixed_items.reduce((s,f)=>s+parseFloat(f.amount||0),0);

  async function saveBudget(cat,amt){
    await D.setBudget(cat,parseFloat(amt)||0,uid);
    toast_('Budget saved','success');
    setEditBudget(null);
    await reload();
  }

  return(
    <div>
      <div className="tab-pills">
        <button className={`tab-pill${sub==='spend'?' active':''}`} onClick={()=>setSub('spend')}>Spending</button>
        <button className={`tab-pill${sub==='bills'?' active':''}`} onClick={()=>setSub('bills')}>Fixed Bills</button>
      </div>

      {sub==='spend'&&(
        <div>
          <div className="grid2" style={{marginBottom:12}}>
            <MCard label="Budgeted" val={fmt(budgeted)} sub="per month"/>
            <MCard label="Spent" val={fmt(mTx.reduce((s,t)=>s+parseFloat(t.amount||0),0))} sub="this month"/>
          </div>
          {categories.map(c=>{
            const spent=catSpend[c.name]||0;
            const baseBudget=parseFloat(budget_targets.find(b=>b.category===c.name)?.monthly_amount||0);
            const rollover=baseBudget>0?calcRollover(c.name,budget_targets,transactions):0;
            const budget=baseBudget+rollover;
            const pct=budget?Math.round((spent/budget)*100):0;
            return(
              <div key={c.id||c.name} className="card-sm" style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:18}}>{c.icon}</span>
                    <span style={{fontWeight:600}}>{c.name}</span>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:15}}>{fmt(spent)}{budget?<span style={{color:'var(--muted)',fontWeight:400}}> / {fmt(budget)}</span>:''}</div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      {rollover>0&&<span style={{fontSize:10,color:'var(--accent2)',fontWeight:700}}>+{fmt(rollover)} rollover</span>}
                      {editBudget===c.name?null:<button onClick={()=>setEditBudget(c.name)} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontSize:12}}>{baseBudget?'edit':'set budget'}</button>}
                    </div>
                  </div>
                </div>
                {budget>0&&<ProgBar pct={pct} color={c.color}/>}
                {editBudget===c.name&&(
                  <BudgetInlineEdit cat={c.name} current={budget} onSave={saveBudget} onCancel={()=>setEditBudget(null)}/>
                )}
              </div>
            );
          })}
        </div>
      )}

      {sub==='bills'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <MCard label="Monthly Fixed" val={fmt(totalFixed)}/>
            <button className="btn btn-primary btn-sm" onClick={()=>setNewFixed(true)}>+ Add Bill</button>
          </div>
          {fixed_items.length===0&&<Empty h="No fixed bills" msg="Add recurring bills to track them on your calendar." icon="📅"/>}
          {fixed_items.map(f=>(
            <FixedItemRow key={f.id} item={f} uid={uid} toast_={toast_} reload={reload}/>
          ))}
          {newFixed&&<FixedItemForm uid={uid} onSave={async()=>{setNewFixed(false);await reload();}} onCancel={()=>setNewFixed(false)} toast_={toast_}/>}
        </div>
      )}
    </div>
  );
}

function BudgetInlineEdit({cat,current,onSave,onCancel}){
  const[val,setVal]=useState(current||'');
  return(
    <div style={{display:'flex',gap:8,marginTop:8}}>
      <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Monthly budget" style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',color:'var(--text)',fontSize:15}}/>
      <button className="btn btn-primary btn-sm" onClick={()=>onSave(cat,val)}>Save</button>
      <button className="btn btn-ghost btn-sm" onClick={onCancel}>✕</button>
    </div>
  );
}

function FixedItemRow({item,uid,toast_,reload}){
  const[editing,setEditing]=useState(false);
  async function del(){
    await D.deleteFixedItem(item.id);
    toast_('Removed','success');
    await reload();
  }
  if(editing) return<FixedItemForm uid={uid} item={item} onSave={async()=>{setEditing(false);await reload();}} onCancel={()=>setEditing(false)} toast_={toast_}/>;
  return(
    <div className="card-sm" style={{marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:600}}>{item.name}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>Due day {item.due_day||'?'} · {item.account||''} · {item.category||''}</div>
      </div>
      <div style={{textAlign:'right'}}>
        <div style={{fontWeight:700}}>{fmt(item.amount)}</div>
        <div style={{display:'flex',gap:6}}>
          <button style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontSize:12}} onClick={()=>setEditing(true)}>edit</button>
          <button style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12}} onClick={del}>✕</button>
        </div>
      </div>

}

function FixedItemForm({uid,item,onSave,onCancel,toast_}){
  const[name,setName]=useState(item?.name||'');
  const[amt,setAmt]=useState(item?.amount||'');
  const[day,setDay]=useState(item?.due_day||'');
  const[acct,setAcct]=useState(item?.account||'');
  const[cat,setCat]=useState(item?.category||'');
  const[saving,setSaving]=useState(false);
  async function save(){
    if(!name||!amt){toast_('Name and amount required','error');return;}
    setSaving(true);
    if(item?.id){await D.updateFixedItem(item.id,{name,amount:parseFloat(amt),due_day:parseInt(day)||null,account:acct,category:cat});}
    else{await D.addFixedItem({name,amount:parseFloat(amt),due_day:parseInt(day)||null,account:acct,category:cat},uid);}
    toast_('Saved','success');await onSave();setSaving(false);
  }
  return(
    <div className="card" style={{marginBottom:8}}>
      <div style={{fontWeight:600,marginBottom:12}}>{item?'Edit Bill':'New Fixed Bill'}</div>
      <div className="field"><label>Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Rent"/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="field"><label>Amount</label><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00" inputMode="decimal"/></div>
        <div className="field"><label>Due Day</label><input type="number" value={day} onChange={e=>setDay(e.target.value)} placeholder="1-31" min="1" max="31"/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="field"><label>Account</label><input value={acct} onChange={e=>setAcct(e.target.value)} placeholder="Checking"/></div>
        <div className="field"><label>Category</label><input value={cat} onChange={e=>setCat(e.target.value)} placeholder="Housing"/></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-primary btn-sm" onClick={save} disabled={saving} style={{flex:1}}>{saving?'Saving…':'Save'}</button>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   DEBTS TAB
══════════════════════════════════════════════ */
function DebtTab({data,uid,toast_,reload}){
  const{debts=[],savings_goals=[]}=data;
  const[sub,setSub]=useState('all');
  const[adding,setAdding]=useState(false);
  const[editDebt,setEditDebt]=useState(null);
  const[editGoal,setEditGoal]=useState(null);
  const[addGoal,setAddGoal]=useState(false);

  const totalDebt=debts.filter(d=>d.current_balance>0).reduce((s,d)=>s+parseFloat(d.current_balance||0),0);
  const totalMonthly=debts.filter(d=>d.current_balance>0).reduce((s,d)=>s+parseFloat(d.monthly_payment||0),0);
  const timeline=useMemo(()=>calcPayoffTimeline(debts),[debts]);

  const activeGoals=savings_goals.filter(g=>!g.archived);
  const totalSaved=activeGoals.reduce((s,g)=>s+parseFloat(g.current_amount||0),0);
  const totalGoal=activeGoals.reduce((s,g)=>s+parseFloat(g.target_amount||0),0);

  function fmtMonths(m){
    if(!m) return '';
    if(m<12) return `${m}mo`;
    const y=Math.floor(m/12),mo=m%12;
    return mo>0?`${y}yr ${mo}mo`:`${y}yr`;
  }

  return(
    <div>
      <div className="tab-pills">
        <button className={`tab-pill${sub==='all'?' active':''}`} onClick={()=>setSub('all')}>Overview</button>
        <button className={`tab-pill${sub==='timeline'?' active':''}`} onClick={()=>setSub('timeline')}>Timeline</button>
      </div>

      {sub==='all'&&(
        <div>
          {/* Debts section */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="section-title" style={{margin:0}}>💳 Debts</div>
            <button className="btn btn-secondary btn-sm" onClick={()=>setAdding(true)}>+ Add</button>
          </div>
          <div className="grid2" style={{marginBottom:12}}>
            <MCard label="Total Debt" val={fmt(totalDebt)} color="var(--red)"/>
            <MCard label="Monthly Payments" val={fmt(totalMonthly)} sub="combined"/>
          </div>
          {debts.length===0&&<Empty h="No debts" msg="Add loans, credit cards, and other debts to track payoff." icon="💳"/>}
          {debts.map(d=>(
            <DebtCard key={d.id} debt={d} uid={uid} toast_={toast_} reload={reload}/>
          ))}
          {adding&&<DebtForm uid={uid} onSave={async()=>{setAdding(false);await reload();}} onCancel={()=>setAdding(false)} toast_={toast_}/>}

          {/* Goals section */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'20px 0 8px'}}>
            <div className="section-title" style={{margin:0}}>🎯 Savings Goals</div>
            <button className="btn btn-secondary btn-sm" onClick={()=>setAddGoal(true)}>+ Add</button>
          </div>
          <div className="grid2" style={{marginBottom:12}}>
            <MCard label="Total Saved" val={fmt(totalSaved)} color="var(--accent2)"/>
            <MCard label="Total Goal" val={fmt(totalGoal)}/>
          </div>
          {activeGoals.length===0&&<Empty h="No goals yet" msg="Create a savings goal like a vacation or emergency fund." icon="🎯"/>}
          {activeGoals.map(g=>(
            <GoalCard key={g.id} goal={g} uid={uid} toast_={toast_} reload={reload}/>
          ))}
          {addGoal&&<GoalForm uid={uid} onSave={async()=>{setAddGoal(false);await reload();}} onCancel={()=>setAddGoal(false)} toast_={toast_}/>}
        </div>
      )}

      {sub==='timeline'&&(
        <div>
          {timeline.length===0&&<Empty h="No payoff timeline" msg="Add debts with balances and monthly payments to see your payoff order." icon="📅"/>}
          {timeline.length>0&&(
            <>
              <div className="sbanner blue" style={{marginBottom:8}}>
                <span style={{fontSize:20}}>🏁</span>
                <span>Debt-free by ~{timeline[timeline.length-1].date?new Date(timeline[timeline.length-1].date+'T12:00').toLocaleDateString('en-US',{month:'long',year:'numeric'}):'calculating…'}</span>
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:12,paddingLeft:4}}>
                ❄️ Snowball method — each payoff rolls freed cash onto the next debt. Individual debt cards show standalone payoff dates without this boost.
              </div>
              {timeline.map((ev,i)=>(
                <div key={i} style={{display:'flex',gap:12,marginBottom:16}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{width:14,height:14,borderRadius:'50%',background:ev.color,flexShrink:0,marginTop:3}}/>
                    {i<timeline.length-1&&<div style={{width:2,flex:1,background:'var(--border)',marginTop:4}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:12}}>
                    <div style={{fontWeight:700,fontSize:15}}>{ev.event}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>
                      {ev.date?new Date(ev.date+'T12:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):''}
                      {ev.months?` · ${fmtMonths(ev.months)} remaining`:''}
                      {' · '}{ev.sub}
                    </div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function DebtCard({debt,uid,toast_,reload}){
  const[editing,setEditing]=useState(false);
  const[paying,setPaying]=useState(false);
  const[payAmt,setPayAmt]=useState('');
  const[logTx,setLogTx]=useState(true);
  const[savingPay,setSavingPay]=useState(false);
  const origBal=debt.original_amount||debt.original_balance||debt.current_balance;
  const pct=origBal?Math.round(((origBal-debt.current_balance)/origBal)*100):0;
  const payoff=calcSinglePayoff(debt.current_balance,debt.monthly_payment,debt.interest_rate);

  async function del(){
    await D.deleteDebt(debt.id);
    toast_('Removed','success');
    await reload();
  }

  async function submitPayment(){
    const amt=parseFloat(payAmt);
    if(!amt||amt<=0){toast_('Enter a valid amount','error');return;}
    setSavingPay(true);
    const newBal=Math.max(0,parseFloat(debt.current_balance)-amt);
    await D.updateDebt(debt.id,{current_balance:newBal});
    if(logTx){
      await D.addTx({
        description:`Payment — ${debt.name}`,
        amount:amt,date:today(),
        category:'Other',account:'Checking',
        note:'Debt payment'
      },uid);
    }
    toast_(`Payment logged! Balance now ${fmt(newBal)}`,'success');
    setPaying(false);setPayAmt('');
    await reload();
    setSavingPay(false);
  }

  if(editing) return<DebtForm uid={uid} item={debt} onSave={async()=>{setEditing(false);await reload();}} onCancel={()=>setEditing(false)} toast_={toast_}/>;
  return(
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <div style={{fontWeight:700,fontSize:16}}>{debt.name}</div>
        <div style={{fontWeight:800,fontSize:17,color:debt.current_balance<=0?'var(--green)':'var(--red)'}}>
          {debt.current_balance<=0?'✅ Paid off':fmt(debt.current_balance)}
        </div>
      </div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>
        {debt.interest_rate>0?`${debt.interest_rate}% APR`:'0% interest'}
        {' · '}{fmt(debt.monthly_payment)}/mo
      </div>
      {debt.promo_end&&(()=>{
        const promoDate=new Date(debt.promo_end);
        const daysLeft=Math.ceil((promoDate-new Date())/(1000*60*60*24));
        const color=daysLeft<60?'var(--red)':daysLeft<180?'var(--amber)':'var(--accent2)';
        const label=daysLeft<0?'⚠️ Promo expired!':daysLeft<60?`⚠️ Promo ends in ${daysLeft} days!`:daysLeft<180?`⏰ Promo ends ${promoDate.toLocaleDateString('en-US',{month:'short',year:'numeric'})}` :`✅ 0% until ${promoDate.toLocaleDateString('en-US',{month:'short',year:'numeric'})}`;
        return<div style={{fontSize:12,fontWeight:600,color,marginBottom:6,padding:'4px 8px',background:`${color}18`,borderRadius:6,display:'inline-block'}}>{label}</div>;
      })()}
      <ProgBar pct={pct} color={debt.color||'var(--accent)'}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4,marginBottom:4}}>
        <span style={{fontSize:11,color:'var(--muted)'}}>{pct}% paid off</span>
        {payoff&&<span style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>
          🏁 {payoff.date.toLocaleDateString('en-US',{month:'short',year:'numeric'})} · {payoff.months<12?`${payoff.months}mo`:payoff.months%12>0?`${Math.floor(payoff.months/12)}yr ${payoff.months%12}mo`:`${Math.floor(payoff.months/12)}yr`}
        </span>}
        {!payoff&&debt.current_balance>0&&debt.monthly_payment>0&&<span style={{fontSize:11,color:'var(--muted)'}}>Add interest rate to see payoff date</span>}
      </div>

      {paying&&(
        <div style={{marginTop:12,padding:12,background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)'}}>
          <div style={{fontWeight:600,marginBottom:8}}>Log a Payment</div>
          <input type="number" value={payAmt} onChange={e=>setPayAmt(e.target.value)}
            placeholder={`Suggested: ${fmt(debt.monthly_payment)}`}
            inputMode="decimal" autoFocus
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',color:'var(--text)',fontSize:16,marginBottom:8}}/>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,cursor:'pointer'}} onClick={()=>setLogTx(v=>!v)}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${logTx?'var(--accent)':'var(--border)'}`,background:logTx?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {logTx&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1,5 4,8 9,2" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <span style={{fontSize:13,color:'var(--muted)',userSelect:'none'}}>Also log as a transaction</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={submitPayment} disabled={savingPay} style={{flex:1}}>{savingPay?'Saving…':'Log Payment'}</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setPaying(false);setPayAmt('');}}>Cancel</button>
          </div>
        </div>
      )}

function GoalCard({goal,uid,toast_,reload}){
  const[editing,setEditing]=useState(false);
  const[adding,setAdding]=useState(false);
  const[addAmt,setAddAmt]=useState('');
  const[saving,setSaving]=useState(false);
  const pct=goal.target_amount?Math.min(100,Math.round((goal.current_amount/goal.target_amount)*100)):0;
  const remaining=Math.max(0,parseFloat(goal.target_amount||0)-parseFloat(goal.current_amount||0));

  async function del(){
    await D.deleteGoal(goal.id);
    toast_('Goal removed','success');
    await reload();
  }

  async function submitFunds(){
    const amt=parseFloat(addAmt);
    if(!amt||amt<=0){toast_('Enter a valid amount','error');return;}
    setSaving(true);
    const newAmt=parseFloat(goal.current_amount||0)+amt;
    await D.upsertGoal({...goal,current_amount:newAmt},uid);
    toast_(`+${fmt(amt)} added! ${fmt(Math.max(0,parseFloat(goal.target_amount||0)-newAmt))} to go`,'success');
    setAdding(false);setAddAmt('');
    await reload();
    setSaving(false);
  }

  if(editing) return<GoalForm uid={uid} item={goal} onSave={async()=>{setEditing(false);await reload();}} onCancel={()=>setEditing(false)} toast_={toast_}/>;
  return(
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <div style={{fontWeight:700,fontSize:16}}>{goal.emoji||'🎯'} {goal.name}</div>
        <div style={{fontWeight:700,color:pct>=100?'var(--green)':'var(--accent2)'}}>{fmt(goal.current_amount)}</div>
      </div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>
        Goal: {fmt(goal.target_amount)} · {pct}% there
        {goal.monthly_contribution?` · ${fmt(goal.monthly_contribution)}/mo`:''}
        {remaining>0?` · ${fmt(remaining)} to go`:''}
      </div>
      <ProgBar pct={pct} color={goal.color||'var(--accent2)'}/>

      {pct>=100&&<div style={{textAlign:'center',padding:'8px 0',fontSize:14,fontWeight:700,color:'var(--green)'}}>🎉 Goal reached!</div>}

      {adding&&(
        <div style={{marginTop:12,padding:12,background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)'}}>
          <div style={{fontWeight:600,marginBottom:8}}>Add Funds</div>
          <input type="number" value={addAmt} onChange={e=>setAddAmt(e.target.value)}
            placeholder={goal.monthly_contribution?`Suggested: ${fmt(goal.monthly_contribution)}`:'Amount'}
            inputMode="decimal" autoFocus
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',color:'var(--text)',fontSize:16,marginBottom:8}}/>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={submitFunds} disabled={saving} style={{flex:1}}>{saving?'Saving…':'Add Funds'}</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setAdding(false);setAddAmt('');}}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:8,marginTop:8}}>
        {pct<100&&<button className="btn btn-primary btn-sm" onClick={()=>setAdding(p=>!p)} style={{flex:1}}>+ Add Funds</button>}
        <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(true)}>Edit</button>
        <button className="btn btn-danger btn-sm" onClick={del}>Remove</button>
      </div>
    </div>
  );
}

function TrendsTab({data}){
  const{transactions=[],income_events=[],categories=[]}=data;

  // Last 6 months spending
  const months6=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const spend=transactions.filter(t=>t.date?.startsWith(key)&&t.type!=='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
    const income=income_events.filter(e=>e.date?.startsWith(key)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
    months6.push({label:new Date(d).toLocaleDateString('en-US',{month:'short'}),key,spend,income,value:spend});
  }

  // Top categories this month
  const now=new Date();
  const mStart=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const catTotals={};
  transactions.filter(t=>t.date>=mStart&&t.type!=='income').forEach(t=>{
    catTotals[t.category]=(catTotals[t.category]||0)+parseFloat(t.amount||0);
  });
  const topCats=Object.entries(catTotals).map(([cat,val])=>{
    const c=categories.find(x=>x.name===cat);
    return{label:cat,value:val,color:c?.color||'#6c63ff'};
  }).sort((a,b)=>b.value-a.value).slice(0,6);

  const avgMonthly=months6.reduce((s,m)=>s+m.spend,0)/months6.filter(m=>m.spend>0).length||0;

  return(
    <div>
      <div className="grid2">
        <MCard label="Avg Monthly" val={fmt(avgMonthly)} sub="last 6 months" color="var(--amber)"/>
        <MCard label="Total Logged" val={transactions.filter(t=>t.type!=='income').length} sub="transactions"/>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div className="section-title" style={{margin:0}}>Spending — Last 6 Months</div>
          <div style={{display:'flex',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
              <div style={{width:10,height:10,borderRadius:2,background:'var(--accent)',opacity:.85}}/> Spending
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
              <div style={{width:16,height:2,background:'var(--accent2)',borderRadius:1}}/> Income
            </div>
          </div>
        </div>
        <SVGBarChart
        data={months6.map(m=>({label:m.label,value:m.spend,color:'var(--accent)'}))}
        incomeLine={months6.map(m=>m.income)}
        height={130} showAmounts/>
      </div>

      <div className="card">
        <div className="section-title">Income vs Spending</div>
        <div>
          {months6.map((m,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:600}}>{m.label}</span>
                <span style={{fontSize:13,color:m.income>=m.spend?'var(--green)':'var(--red)',fontWeight:700}}>
                  {m.income>=m.spend?'+':'-'}{fmt(Math.abs(m.income-m.spend))}
                </span>
              </div>
              <div style={{display:'flex',gap:4}}>
                <div style={{flex:m.income||1,background:'var(--green)',height:6,borderRadius:3,opacity:.7}}/>
                <div style={{flex:m.spend||0.01,background:'var(--red)',height:6,borderRadius:3,opacity:.7}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                <span style={{fontSize:10,color:'var(--muted)'}}>In: {fmt(m.income)}</span>
                <span style={{fontSize:10,color:'var(--muted)'}}>Out: {fmt(m.spend)}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {topCats.length>0&&(
        <div className="card">
          <div className="section-title">Top Categories This Month</div>
          {topCats.map((c,i)=>(
            <div key={i} className="row-item">
              <div className="row-left">
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:c.color}}/>
                  <span style={{fontWeight:600}}>{c.label}</span>
                </div>
              </div>
              <div style={{fontWeight:700}}>{fmt(c.value)}</div>
            </div>
          ))}
        </div>
      )}
      <YearInReview data={data}/>
      <RecurringSection data={data}/>
    </div>
  );
}
