function SettingsTab({data,uid,user,toast_,reload,onLogout}){
  const{settings=[],accounts=[],quick_log_items=[],categories=[]}=data;
  const[sub,setSub]=useState('general');
  const[payFreq,setPayFreq]=useState(settings.find(s=>(s.key||s.id)==='pay_frequency')?.value||'semimonthly');
  const[perCheck,setPerCheck]=useState(settings.find(s=>(s.key||s.id)==='pay_per_check')?.value||'');
  const[saving,setSaving]=useState(false);
  const[importFile,setImportFile]=useState(null);
  const[importing,setImporting]=useState(false);

  async function saveGeneral(){
    setSaving(true);
    await D.setSetting('pay_frequency',payFreq,uid);
    await D.setSetting('pay_per_check',perCheck||'0',uid);
    toast_('Settings saved','success');
    await reload();
    setSaving(false);
  }

  async function doImport(){
    if(!importFile){toast_('Choose a file','error');return;}
    setImporting(true);
    try{
      const text=await importFile.text();
      const json=JSON.parse(text);
      await D.importData(json,uid);
      toast_('Import complete!','success');
      await reload();
    }catch(e){toast_('Import failed: '+e.message,'error');}
    setImporting(false);
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div>
          <div style={{fontWeight:700}}>{user?.email}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>Logged in</div>
        </div>
        <button className="btn btn-danger btn-sm" onClick={onLogout}>Sign Out</button>
      </div>
      <NetWorthCard data={data}/>

      <div className="tab-pills">
        <button className={`tab-pill${sub==='general'?' active':''}`} onClick={()=>setSub('general')}>General</button>
        <button className={`tab-pill${sub==='data'?' active':''}`} onClick={()=>setSub('data')}>Data</button>
      </div>

      {sub==='general'&&(
        <div>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:4}}>💵 Auto Paycheck</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Your paycheck is auto-logged on every pay date. Update the amount here if your income changes.</div>
            <div className="field">
              <label>Take-home per paycheck</label>
              <input type="number" value={perCheck} onChange={e=>setPerCheck(e.target.value)} placeholder="0.00" inputMode="decimal" style={{fontSize:22,fontWeight:700}}/>
            </div>
            <div className="field">
              <label>Pay Frequency</label>
              <select value={payFreq} onChange={e=>setPayFreq(e.target.value)}>
                <option value="semimonthly">Semi-monthly (1st & 15th)</option>
                <option value="biweekly">Every 2 weeks</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <button className="btn btn-primary" onClick={saveGeneral} disabled={saving}>{saving?'Saving…':'Save'}</button>
          </div>

          <div className="card">
            <div style={{fontWeight:600,marginBottom:4}}>Account Balances</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Tap an account to update its balance.</div>
            {accounts.map(a=>(
              <AccountRow key={a.id} account={a} toast_={toast_} reload={reload}/>
            ))}
            <button className="btn btn-ghost btn-sm" style={{marginTop:8,width:'100%'}} onClick={async()=>{
              const name=prompt('Account name?');
              if(!name) return;
              await D.addAccount({name,balance:0,type:'checking'},uid);
              await reload();
            }}>+ Add Account</button>
          </div>
        </div>
      )}

      {sub==='data'&&(
        <div>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:8}}>Export Your Data</div>

            <ExportBtn uid={uid} toast_={toast_}/>

  settings:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
};

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(undefined); // undefined=loading
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[tab,setTab]=useState('dash');
  const[showAdd,setShowAdd]=useState(false);
  const[showIncome,setShowIncome]=useState(false);
  const[showClaim,setShowClaim]=useState(false);
  const[needsSetup,setNeedsSetup]=useState(false);
  const{toast_,ToastContainer}=useToast();

  // Auth listener
  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
    });
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load data when user is known
  useEffect(()=>{
    if(user===undefined) return;
    if(!user){setData(null);return;}
    loadAll();
  },[user]);

  async function loadAll(){
    if(!user) return;
    setLoading(true);
    try{
      const ns=await D.needsSetup(user.id);
      if(ns){setNeedsSetup(true);setLoading(false);return;}
      setNeedsSetup(false);
      let d=await D.getAll(user.id);
      // Auto-log any missed paychecks silently
      const logged=await autoLogPaychecks(d,user.id);
      if(logged) d=await D.getAll(user.id);
      setData(d);
      // Check legacy
      const hasLeg=await D.hasLegacyData();
      setShowClaim(hasLeg);
    }catch(e){toast_('Failed to load data','error');}
    setLoading(false);
  }

  async function handleLogout(){
    await db.auth.signOut();
    setData(null);
    setUser(null);
  }

  // Loading spinner
  if(user===undefined||loading){
    return(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
        <div style={{fontSize:40}}>💰</div>
        <div style={{color:'var(--muted)'}}>Loading…</div>
      </div>
    );
  }

  // Auth
  if(!user) return<AuthScreen onAuth={u=>{setUser(u);loadAll();}}/>;

  // Setup
  if(needsSetup) return<SetupScreen uid={user.id} onDone={async()=>{
    setNeedsSetup(false);
    setLoading(true);
    try{
      const d=await D.getAll(user.id);
      setData(d);
      const hasLeg=await D.hasLegacyData();
      setShowClaim(hasLeg);
    }catch(e){toast_('Failed to load data','error');}
    setLoading(false);
  }}/>;

  // No data yet
  if(!data) return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{color:'var(--muted)'}}>Loading your data…</div>
    </div>
  );

  const qItems=data.quick_log_items||[];
  const accounts=data.accounts||[];

  return(
    <div className="app-wrap">
      <ToastContainer/>
      {showAdd&&<AddModal uid={user.id} categories={data.categories||[]} accounts={accounts} quickLog={qItems} onSave={async()=>{setShowAdd(false);await loadAll();}} onClose={()=>setShowAdd(false)} toast_={toast_}/>}
      {showIncome&&<IncomeModal uid={user.id} accounts={accounts} onSave={async()=>{setShowIncome(false);await loadAll();}} onClose={()=>setShowIncome(false)} toast_={toast_}/>}

      <div className="main-scroll">
        {/* Claim banner */}
        {showClaim&&<ClaimBanner uid={user.id} onClaim={async()=>{setShowClaim(false);await loadAll();}} onDismiss={()=>setShowClaim(false)}/>}

        {tab==='dash'&&<DashTab data={data} uid={user.id} onAdd={()=>setShowAdd(true)} onAddIncome={()=>setShowIncome(true)} toast_={toast_}/>}
        {tab==='income'&&<IncomeTab data={data} uid={user.id} onAdd={()=>setShowIncome(true)} toast_={toast_} reload={loadAll}/>}
        {tab==='budget'&&<BudgetTab data={data} uid={user.id} toast_={toast_} reload={loadAll}/>}
        {tab==='debts'&&<DebtTab data={data} uid={user.id} toast_={toast_} reload={loadAll}/>}
        {tab==='trends'&&<TrendsTab data={data}/>}
        {tab==='settings'&&<SettingsTab data={data} uid={user.id} user={user} toast_={toast_} reload={loadAll} onLogout={handleLogout}/>}
        {tab==='trans'&&<TransTab data={data} uid={user.id} onAdd={()=>setShowAdd(true)} toast_={toast_} reload={loadAll}/>}
      </div>

      {/* FAB */}
      <button className="bnav-fab" onClick={()=>setShowAdd(true)} title="Log expense">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      {/* Bottom Nav */}
      <nav className="bnav">
        {[
          {id:'dash',label:'Home',icon:NavIcons.dash},
          {id:'budget',label:'Budget',icon:NavIcons.budget},
          {id:'debts',label:'Debts',icon:NavIcons.debts},
          {id:'trends',label:'Trends',icon:NavIcons.trends},
          {id:'income',label:'Income',icon:NavIcons.income},
          {id:'settings',label:'More',icon:NavIcons.settings},
        ].map(n=>(
          <button key={n.id} className={`bnav-item${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
            {n.icon}
            {n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
